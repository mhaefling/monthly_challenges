{% extends "base.html" %}


{% block title %}
    <title>{{ month|title }} Challenge</title>
{% endblock %}

{% block body %}
    <h1>The {{ month|title }} Challenge</h1>
    {% if text != None %}
        <h2>{{ text }}</h2>
    {% else %}
        <h2>There is no challenge for this month!</h2>
    {% endif %}
{% endblock %}
